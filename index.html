}

// ===== ERROR BOUNDARY =====
class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  render(){
    if(this.state.hasError){
      return React.createElement("div",{style:{padding:40,textAlign:"center",color:"#e2e8f0",background:"#0a0e17",height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}},

        React.createElement("p",{style:{fontSize:13,color:"#8896ab",fontFamily:"'IBM Plex Sans',sans-serif",marginBottom:16,maxWidth:400}},this.state.error?.message||"Error desconocido"),
        React.createElement("button",{onClick:()=>this.setState({hasError:false,error:null}),style:{background:"#A63D40",border:"none",borderRadius:8,padding:"10px 24px",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}},"Reintentar")
      );
    }
    return this.props.children;
  }
}

const PROXY_URL="https://yellow-paper-dc25.saulpaulino8.workers.dev";

const api = {
  base: "https://yellow-paper-dc25.saulpaulino8.workers.dev",
  async call(path, method="GET", body=null) {
    const token = sessionStorage.getItem("geotechnical_token");
    const opts = { method, headers: {"Content-Type":"application/json"} };
    if (token) opts.headers["Authorization"] = "Bearer " + token;
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(this.base + path, opts);
    if (res.status === 401) { sessionStorage.removeItem("geotechnical_token"); sessionStorage.removeItem("geotechnical_user"); window.location.reload(); }
    return res.json();
  }
};

async function claudeCall(claudeKey, prompt, useWebSearch=true){
  const body={apiKey:claudeKey,model:"claude-sonnet-4-20250514",max_tokens:4096,messages:[{role:"user",content:prompt}]};
  if(useWebSearch)body.tools=[{type:"web_search_20250305",name:"web_search",max_uses:3}];
  const res=await fetch(PROXY_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const rawText=await res.text();
  if(!res.ok)throw new Error(`API ${res.status}: ${rawText.slice(0,300)}`);
  let data;
  try{data=JSON.parse(rawText);}catch(e){throw new Error("JSON parse failed: "+rawText.slice(0,200));}
  if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));
  // Extract ALL text blocks from response (web_search returns mixed content blocks)
  let text="";
  if(data.content&&Array.isArray(data.content)){
    for(const b of data.content){if(b.type==="text")text+=b.text;}
  }
  if(!text&&data.content)text=JSON.stringify(data.content);
  console.log("[claudeCall] stop_reason:",data.stop_reason,"text length:",text.length,"text preview:",text.slice(0,300));
  return text;
}

function parseJSONArray(text){
  if(!text||!text.trim())return[];
  // Strip markdown fences
  let cleaned=text.replace(/```json\n?/g,"").replace(/```\n?/g,"").trim();
  // Try to find JSON array
  const m=cleaned.match(/\[[\s\S]*\]/);
  if(m){
    try{return JSON.parse(m[0]);}catch(e){
      // Try fixing common issues: trailing commas, single quotes
      const fixed=m[0].replace(/,\s*\]/g,"]").replace(/,\s*\}/g,"}");
      try{return JSON.parse(fixed);}catch(e2){console.log("[parseJSONArray] Parse failed:",e2.message,"raw:",m[0].slice(0,200));}
    }
  }
  console.log("[parseJSONArray] No array found in:",cleaned.slice(0,300));
  return [];
}

function Gauge({value,size=48}){
  const r=(size-6)/2,c=Math.PI*2*r,off=c-(value/100)*c;
  const col=value>=80?C.ok:value>=60?C.hi:C.md;
  return React.createElement("div",{style:{position:"relative",width:size,height:size}},
    React.createElement("svg",{width:size,height:size,style:{transform:"rotate(-90deg)"}},
      React.createElement("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:C.brd,strokeWidth:"3"}),
      React.createElement("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:col,strokeWidth:"3",strokeDasharray:c,strokeDashoffset:off,strokeLinecap:"round",style:{transition:"stroke-dashoffset .8s"}})
    ),
    React.createElement("span",{style:{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,fontFamily:F.m,color:col}},value+"%")
  );
}

function Bars({data,dk,color,h=80}){
  const mx=Math.max(...data.map(d=>d[dk]),1);
  return React.createElement("div",{style:{display:"flex",alignItems:"flex-end",gap:3,height:h,width:"100%"}},
    data.map((d,i)=>React.createElement("div",{key:i,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}},
      React.createElement("div",{style:{width:"100%",maxWidth:28,height:`${(d[dk]/mx)*100}%`,minHeight:3,background:`linear-gradient(180deg,${color},${color}88)`,borderRadius:"3px 3px 0 0",transition:"height .5s"}}),

    ))

}

    {id:"note",icon:"\uD83D\uDCDD",label:"Nota"}

    if(!authToken||!p.id)return;
    api.call("/api/projects/"+p.id+"/activities").then(data=>{
      if(data.activities)setActivities(data.activities);
    }).catch(()=>{});
  },[p.id,authToken]);

  const handleAddNote=()=>{
    if(!noteText.trim())return;

    // Also post to API with type
    if(authToken&&p.id){
      api.call("/api/projects/"+p.id+"/activities","POST",{type:activityType,text:noteText}).then(data=>{
        if(data.id){
          const newAct={id:data.id,type:activityType,text:noteText,user_name:JSON.parse(sessionStorage.getItem("geotechnical_user")||"{}").name||"Tú",created_at:new Date().toISOString()};
          setActivities(prev=>[newAct,...prev]);
        }
      }).catch(()=>{});
    }
    setNoteText("");
  };
  const saveContact=()=>{if(onUpdateProject){onUpdateProject(p.id||p.title,{contactLead:ci.nombre,telefono:ci.telefono,whatsapp:ci.whatsapp,email:ci.email,empresa:ci.empresa});setEditContact(false);}};

  const waLink=p.whatsapp?`https://wa.me/${p.whatsapp.replace(/[^0-9]/g,"")}?text=${waMsg}`:`https://wa.me/?text=${waMsg}`;

  const generatePDF=()=>{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF();
    const w=doc.internal.pageSize.getWidth();
    const margin=20;
    const cw=w-margin*2;
    let y=20;

    // Header bar
    doc.setFillColor(166,61,64);
    doc.rect(0,0,w,35,"F");
    doc.setFont("helvetica","bold");
    doc.setFontSize(22);
    doc.setTextColor(255,255,255);

    doc.text("Fecha: "+new Date().toLocaleDateString("es-DO",{year:"numeric",month:"long",day:"numeric"}),w-margin,28,{align:"right"});

    doc.setFontSize(14);

    doc.setFillColor(240,240,240);

    doc.setTextColor(80,80,80);

      doc.setFontSize(11);
      doc.setTextColor(166,61,64);

function Scanner({claudeKey, projects, onNewProjects}){
  const[scanning,setScanning]=useState(false);
  const[log,setLog]=useState([]);
  const[found,setFound]=useState([]);
  const[autoEnabled,setAutoEnabled]=useState(()=>{try{return localStorage.getItem('geoAutoScan')==='true'}catch(e){return false}});
  const intervalRef=useRef(null);
  
  const addLog=(msg,type="info")=>setLog(prev=>[{msg,type,time:new Date().toLocaleTimeString("es-DO",{hour:"2-digit",minute:"2-digit",second:"2-digit"})},...prev].slice(0,50));

  const runScan=useCallback(async()=>{
    if(scanning||!claudeKey)return;
    setScanning(true);
    addLog("Conectando con Portal DGCP...","scan");
    addLog("Descargando licitaciones recientes del Estado dominicano...","search");

    const existingTitles=projects.map(p=>p.title||p.titulo||"");
    addLog("Enviando búsqueda a Claude con web_search...","search");
    const result=await scanDGCP(claudeKey,existingTitles);

    if(result.success){
      addLog("✅ Claude respondió correctamente","search");
      if(result.raw)addLog("Respuesta (preview): "+result.raw.slice(0,250),"info");
      if(result.projects.length>0){
        addLog(`✅ ${result.projects.length} licitación(es) con potencial de voladura`,"success");
        const newProjects=result.projects.map(normalizeProject);
        setFound(prev=>[...newProjects,...prev]);
        onNewProjects(newProjects);
        newProjects.forEach(p=>addLog(`→ [${p.codigoProceso||p.id||"DGCP"}] ${p.title} | Voladura: ${p.blastingProbability}%`,"project"));
      }else{
        addLog("⚠ Claude no encontró licitaciones nuevas","info");
        if(result.raw)addLog("Texto completo: "+result.raw.slice(0,400),"info");
      }
    }else{
      addLog(`❌ Error API: ${result.error}`,"error");
      if(result.raw)addLog("Raw: "+result.raw.slice(0,300),"info");
    }

    addLog("Escaneo completado","scan");
    setScanning(false);
  },[claudeKey,projects,scanning,onNewProjects]);

  // Persist autoEnabled
  useEffect(()=>{try{localStorage.setItem('geoAutoScan',autoEnabled)}catch(e){}},[autoEnabled]);

    if(autoEnabled&&claudeKey){
      addLog("⏰ Auto-escaneo activado: cada 4 horas","auto");
      intervalRef.current=setInterval(runScan,4*60*60*1000);
      return()=>clearInterval(intervalRef.current);
    }else{
      if(intervalRef.current)clearInterval(intervalRef.current);
    }

        React.createElement("div",{onClick:()=>claudeKey&&setAutoEnabled(!autoEnabled),style:{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",background:autoEnabled?C.okBg:C.bg,border:`1px solid ${autoEnabled?C.ok+"44":C.brd}`,borderRadius:8,cursor:claudeKey?"pointer":"not-allowed",opacity:claudeKey?1:.4}},
          React.createElement("div",{style:{width:36,height:20,borderRadius:10,background:autoEnabled?C.ok:C.brd,display:"flex",alignItems:"center",padding:2,justifyContent:autoEnabled?"flex-end":"flex-start",transition:"all .2s"}},
            React.createElement("div",{style:{width:16,height:16,borderRadius:"50%",background:"#fff",transition:"all .2s"}})
          ),
          React.createElement("span",{style:{fontSize:11,fontFamily:F.m,color:autoEnabled?C.ok:C.txM}},"Auto 4h")
        ),
        // Scan button
        React.createElement("button",{onClick:runScan,disabled:scanning||!claudeKey,style:{background:scanning?"transparent":C.acc,border:scanning?`2px solid ${C.acc}`:"2px solid transparent",borderRadius:10,padding:"10px 24px",fontSize:13,fontWeight:700,color:scanning?C.acc:C.bg,fontFamily:F.m,cursor:scanning||!claudeKey?"not-allowed":"pointer",display:"flex",alignItems:"center",gap:8,animation:scanning?"scanPulse 2s infinite":"none",opacity:claudeKey?1:.4}},

function AIChat({projects,claudeKey}){
  const[msgs,setMsgs]=useState([{role:"assistant",content:"Soy tu analista de inteligencia de mercado. Pregúntame sobre el pipeline, estrategias, competidores, o priorización."}]);
  const[inp,setInp]=useState("");
  const[loading,setLoading]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight},[msgs]);
  
  const send=useCallback(async()=>{
    if(!inp.trim()||loading)return;
    const txt=inp.trim();setInp("");
    setMsgs(p=>[...p,{role:"user",content:txt}]);setLoading(true);
    try{
      if(!claudeKey)throw new Error("No API key");
      const ctx=projects.slice(0,6).map(p=>`- ${p.title}|${p.type}|${p.province}|${fmt(p.estimatedValue)}|Vol:${p.blastingProbability}%|${p.priority}`).join("\n");
      const res=await fetch(PROXY_URL,{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({apiKey:claudeKey,model:"claude-sonnet-4-20250514",max_tokens:1000,
          system:`Eres analista experto de mercado para empresa de explosivos en RD. Pipeline actual:\n${ctx}\nCompetencia: MAXAM 35%, Expl.Caribe 25%, Austin 15%, Nosotros 18%. Revenue trending $45K→$95K. Win rate 86%. Responde en español, conciso y accionable.`,
          messages:[...msgs.filter((m,i)=>!(m.role==="assistant"&&i===0)).map(m=>({role:m.role,content:m.content})),{role:"user",content:txt}]
        })});
      if(!res.ok)throw new Error();
      const data=await res.json();
      setMsgs(p=>[...p,{role:"assistant",content:data.content?.map(i=>i.text||"").join("\n")||"Error."}]);
    }catch{setMsgs(p=>[...p,{role:"assistant",content:"⚠ Configura tu API Key de Claude en el tab Conexión para usar el AI Analyst."}]);}

      )),

    ),

      React.createElement("input",{value:inp,onChange:e=>setInp(e.target.value),onKeyDown:e=>e.key==="Enter"&&send(),placeholder:"Pregunta al AI Analyst...",style:{flex:1,background:C.bg,border:`1px solid ${C.brd}`,borderRadius:8,padding:"10px 14px",fontSize:13,color:C.tx,fontFamily:F.b,outline:"none"}}),

function KanbanBoard({projects,onUpdateStatus,onSelectProject}){
  const colProjects=id=>kanbanColProjects(projects,id);
  const[dragOverCol,setDragOverCol]=useState(null);

  const handleDragStart=(e,project)=>{
    e.dataTransfer.setData("text/plain",project.id||project.title);
    e.dataTransfer.effectAllowed="move";
  };
  const handleDragOver=(e,colId)=>{
    e.preventDefault();
    e.dataTransfer.dropEffect="move";
    setDragOverCol(colId);
  };
  const handleDragLeave=(e,colId)=>{
    if(!e.currentTarget.contains(e.relatedTarget))setDragOverCol(null);
  };
  const handleDrop=(e,colId)=>{
    e.preventDefault();
    setDragOverCol(null);
    const projectId=e.dataTransfer.getData("text/plain");
